name: "S8: Guia Despachos - Colas RabbitMQ y DB Oracle"

# El nombre de cada ejecucion muestra la etapa actual (variable ETAPA del repo).
# Cambia la etapa creando/editando la variable ETAPA (ej. "Pre Demo V02") sin tocar el codigo.
run-name: "S8: Guia Despachos - Colas RabbitMQ y DB Oracle | Etapa: ${{ vars.ETAPA || 'Pre Demo V01' }}"

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # permite ejecutarlo manualmente desde la pestana Actions

env:
  IMAGE_NAME: gestion-pedidos

jobs:
  # ─────────────────────────────────────────────────────────────
  #  JOB 1: Compilar y ejecutar tests
  # ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar tests y compilar
        run: mvn clean verify

      - name: Subir artefacto JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar-build
          path: target/gestion-pedidos-1.0.0.jar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  #  JOB 2: Analisis de seguridad con Trivy (dependencias + config)
  #  Buena practica recomendada por el docente en la S6.
  #  Escanea el codigo/dependencias en busca de vulnerabilidades y
  #  errores de configuracion antes de construir la imagen.
  # ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Escaneo de vulnerabilidades y configuracion (Trivy fs)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,misconfig,secret'
          severity: 'HIGH,CRITICAL'
          format: 'table'
          # No bloquea la entrega: reporta hallazgos en el log del pipeline.
          exit-code: '0'

  # ─────────────────────────────────────────────────────────────
  #  JOB 3: Construir imagen Docker y publicar en Docker Hub
  # ─────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Verificar secrets de Docker Hub
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "::error::Falta el secret DOCKERHUB_USERNAME (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Falta el secret DOCKERHUB_TOKEN. Genera un Access Token con permiso Read & Write en Docker Hub."
            exit 1
          fi
          echo "Secrets de Docker Hub presentes. Usuario: ${{ secrets.DOCKERHUB_USERNAME }}"

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Escaneo de la imagen Docker (Trivy image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

  # ─────────────────────────────────────────────────────────────
  #  JOB 4: Desplegar en EC2 (RabbitMQ + backend + wallet Oracle)
  # ─────────────────────────────────────────────────────────────
  deploy-ec2:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: docker-build-push
    # Solo despliega si estan configurados los secrets del EC2 (opcional).
    if: ${{ vars.DEPLOY_EC2 == 'true' }}
    steps:
      - name: SSH al EC2 y desplegar contenedores
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            # 0) Bootstrap: instalar Docker y unzip si la instancia del lab viene limpia
            if ! command -v docker >/dev/null 2>&1; then
              echo "Instalando Docker..."
              sudo yum install -y docker 2>/dev/null || sudo amazon-linux-extras install -y docker 2>/dev/null || (sudo apt-get update && sudo apt-get install -y docker.io)
              sudo systemctl enable --now docker 2>/dev/null || sudo service docker start || true
            fi
            command -v unzip >/dev/null 2>&1 || sudo yum install -y unzip 2>/dev/null || sudo apt-get install -y unzip

            # Red interna para que el backend resuelva 'rabbitmq' por nombre
            sudo docker network create guias-net || true

            # 1) Broker RabbitMQ (colas)
            sudo docker rm -f rabbitmq-guias || true
            sudo docker run -d --name rabbitmq-guias --network guias-net \
              --restart unless-stopped \
              -p 5672:5672 -p 15672:15672 \
              -e RABBITMQ_DEFAULT_USER=guest -e RABBITMQ_DEFAULT_PASS=guest \
              rabbitmq:3.13-management

            # 2) Wallet de Oracle: se reconstruye desde el secret base64 (NUNCA en git)
            rm -rf ~/wallet && mkdir -p ~/wallet
            echo "${{ secrets.ORACLE_WALLET_B64 }}" | base64 -d > ~/wallet.zip
            unzip -o ~/wallet.zip -d ~/wallet

            # 3) Backend Spring Boot (productor + consumidor)
            sudo docker stop ${{ env.IMAGE_NAME }} || true
            sudo docker rm   ${{ env.IMAGE_NAME }} || true
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            sudo docker run -d \
              --name ${{ env.IMAGE_NAME }} \
              --network guias-net \
              --restart unless-stopped \
              -p 80:8080 \
              -v ~/wallet:/app/wallet:ro \
              -e RABBITMQ_HOST="rabbitmq-guias" \
              -e ORACLE_JDBC_URL="jdbc:oracle:thin:@${{ secrets.ORACLE_TNS_ALIAS }}?TNS_ADMIN=/app/wallet" \
              -e ORACLE_USER="${{ secrets.ORACLE_USER }}" \
              -e ORACLE_PASSWORD="${{ secrets.ORACLE_PASSWORD }}" \
              -e AZURE_ISSUER_URI="${{ secrets.AZURE_ISSUER_URI }}" \
              -e AZURE_JWKS_URI="${{ secrets.AZURE_JWKS_URI }}" \
              -e AZURE_AUDIENCE="${{ secrets.AZURE_AUDIENCE }}" \
              -e AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET }}" \
              -e AWS_S3_REGION="us-east-1" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            sleep 25
            sudo docker ps | grep -E "gestion-pedidos|rabbitmq-guias"
            echo "Despliegue completado."
