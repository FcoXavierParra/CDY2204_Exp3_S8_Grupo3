# =============================================================
#  Sistema ASINCRONO de Gestion de Pedidos y Guias de Despacho
#  CDY2204 - Semana 8 (colas RabbitMQ + Oracle Cloud)
# =============================================================
spring.application.name=gestion-pedidos
server.port=8080

# -------------------------------------------------------------
#  Base de datos Oracle Cloud (Autonomous Database) via Wallet
#  - En local: coloca el wallet descomprimido en ./wallet (ignorado por git)
#    y usa el alias TNS de tnsnames.ora (ej. oraclecloudfparradb_tp).
#  - En EC2/Docker: monta el wallet en /app/wallet y sobre-escribe
#    ORACLE_JDBC_URL con TNS_ADMIN=/app/wallet (ver docker-compose / CI-CD).
#  - La password del usuario ADMIN se inyecta por variable de entorno
#    ORACLE_PASSWORD (NUNCA se versiona en git).
# -------------------------------------------------------------
spring.datasource.url=${ORACLE_JDBC_URL:jdbc:oracle:thin:@oraclecloudfparradb_tp?TNS_ADMIN=./wallet}
spring.datasource.username=${ORACLE_USER:ADMIN}
spring.datasource.password=${ORACLE_PASSWORD:}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
# update: Hibernate crea/actualiza las tablas GUIA_DESPACHO y GUIA_PROCESADA y sus secuencias.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Pool de conexiones (Autonomous Free tiene pocas conexiones disponibles)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# -------------------------------------------------------------
#  RabbitMQ (colas asincronas)
#  - En local: broker levantado con docker-compose (localhost:5672).
#  - En EC2/Docker: sobre-escribir RABBITMQ_HOST con el nombre del servicio.
# -------------------------------------------------------------
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}
spring.rabbitmq.virtual-host=/
# Los mensajes rechazados NO se re-encolan: van a la Dead Letter Queue (COLA 2).
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.acknowledge-mode=auto

# Nombres de exchanges, colas y routing keys (usados por RabbitMQConfig)
app.rabbitmq.exchange=guias.exchange
app.rabbitmq.queue=guias.queue
app.rabbitmq.routingkey=guias.routingkey
app.rabbitmq.dlx=guias.dlx.exchange
app.rabbitmq.error-queue=guias.error.queue
app.rabbitmq.error-routingkey=guias.error.routingkey

# -------------------------------------------------------------
#  Azure AD B2C (IDaaS) - reemplazar placeholders con TUS valores
#  (o sobre-escribir con variables de entorno en EC2 / CI-CD)
# -------------------------------------------------------------
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_ISSUER_URI:https://login.microsoftonline.com/REEMPLAZAR_TENANT_ID/v2.0}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AZURE_JWKS_URI:https://REEMPLAZAR_TENANT.b2clogin.com/REEMPLAZAR_TENANT_ID/discovery/v2.0/keys}
azure.b2c.audience=${AZURE_AUDIENCE:REEMPLAZAR_APPLICATION_CLIENT_ID}
# Nombre del custom claim de rol en el JWT (gestor / consulta)
azure.b2c.role-claim=${AZURE_ROLE_CLAIM:extension_rol}

# -------------------------------------------------------------
#  AWS S3 (PDF de las guias)
# -------------------------------------------------------------
aws.s3.bucket-name=${AWS_S3_BUCKET:REEMPLAZAR_BUCKET_S3}
aws.s3.region=${AWS_S3_REGION:us-east-1}
# Credenciales: dejar VACIO para usar las variables de entorno
# AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_SESSION_TOKEN (recomendado en EC2 y AWS Academy).
aws.access-key=${AWS_ACCESS_KEY_ID:}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:}
aws.session-token=${AWS_SESSION_TOKEN:}

# -------------------------------------------------------------
#  Springdoc / Swagger UI
# -------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# -------------------------------------------------------------
#  Actuator (health)
# -------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Limites de subida de archivos (modificacion de PDF en S3)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
